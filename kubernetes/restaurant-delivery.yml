# Restaurant Portal — ClusterIP only
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant
  namespace: food-delivery
  labels:
    app: restaurant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant
  template:
    metadata:
      labels:
        app: restaurant
    spec:
      containers:
        - name: restaurant
          image: food-delivery-restaurant:v1.0.1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant
  namespace: food-delivery
spec:
  selector:
    app: restaurant
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
